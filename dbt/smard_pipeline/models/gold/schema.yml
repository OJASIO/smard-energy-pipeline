version: 2

models:
  - name: dim_date
    description: "Date dimension table with 2925 days from 2017-2024."
    columns:
      - name: CALENDAR_DATE
        description: "Calendar date"
        tests:
          - not_null
          - unique
      - name: YEAR
        description: "Year number"
        tests:
          - not_null

  - name: dim_energy_sources
    description: "Energy source dimension with 14 German energy types."

  - name: dim_regions
    description: "German TSO control zone dimension. 5 regions."
    columns:
      - name: REGION_CODE
        description: "Region code"
        tests:
          - not_null
          - unique

  - name: fct_energy_readings
    description: >
      Central fact table with 3.8M energy readings from 2017-2024.
      Grain: one row per 15-minute interval per energy source per region.
    columns:
      - name: '"reading_id"'
        description: "Surrogate key"
        tests:
          - not_null
      - name: '"value_mw"'
        description: "Energy value in MW"
        tests:
          - not_null

  - name: fct_cross_border_flows
    description: "Cross-border electricity flow fact table with 465K records."
    columns:
      - name: '"flow_id"'
        description: "Surrogate key"
        tests:
          - not_null
      - name: '"flow_name"'
        description: "Flow type name"
        tests:
          - not_null

  - name: agg_daily_generation
    description: "Daily aggregation of energy generation by source and region."

  - name: agg_hourly_patterns
    description: "Hourly patterns of energy generation averaged across all years."

  - name: agg_renewable_share
    description: "Daily renewable energy share as percentage of total generation."

  - name: agg_weather_correlation
    description: "Weather-energy correlation metrics by day."

  - name: agg_price_analysis
    description: "Daily electricity price analysis for DE-LU bidding zone."

  - name: agg_regional_comparison
    description: "Regional comparison of energy generation across 5 German TSO zones."

  - name: agg_cross_border_daily
    description: "Daily aggregation of cross-border electricity flows."
    columns:
      - name: AGG_DATE
        description: "Aggregation date"
        tests:
          - not_null
