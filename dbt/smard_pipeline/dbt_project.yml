
name: smard_pipeline
version: 1.0.0
config-version: 2

profile: smard_pipeline

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

models:
  smard_pipeline:
    silver:
      +materialized: incremental
      +on_schema_change: append_new_columns
    gold:
      dims:
        +materialized: table
      facts:
        +materialized: incremental
        +on_schema_change: append_new_columns
      aggs:
        +materialized: incremental
        +on_schema_change: append_new_columns
